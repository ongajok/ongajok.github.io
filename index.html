<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온가족간병협회</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/text/babel">
        const App = () => {
            return (
                <div style={{ minHeight: '100vh', backgroundColor: '#f8fafc', fontFamily: 'sans-serif', color: '#1e293b' }}>
                    <header style={{ position: 'sticky', top: 0, zIndex: 50, borderBottom: '1px solid #e2e8f0', backgroundColor: 'rgba(255, 255, 255, 0.8)', backdropFilter: 'blur(8px)' }}>
                        <div style={{ margin: '0 auto', display: 'flex', height: '80px', maxWidth: '1280px', itemsCenter: 'center', justifyContent: 'between', padding: '0 24px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <span style={{ fontSize: '24px', fontWeight: '900', color: '#4f46e5' }}>온가족간병협회</span>
                            </div>
                        </div>
                    </header>
                    <main style={{ margin: '0 auto', maxWidth: '1280px', padding: '48px 24px' }}>
                        <div style={{ textAlign: 'center', padding: '80px 16px', background: 'linear-gradient(to top right, #4f46e5, #7c3aed)', borderRadius: '24px', color: '#ffffff' }}>
                            <h1 style={{ fontSize: '36px', fontWeight: '900', marginBottom: '24px', lineHeight: '1.2' }}>우리 가족을 위한<br/>가장 따뜻하고 안전한 간병</h1>
                            <p style={{ fontSize: '18px', color: '#e0e7ff', maxWidth: '640px', margin: '0 auto 32px auto', fontWeight: '500' }}>온가족간병협회는 검증된 전문 간병인과 가족을 신뢰로 연결하여, 힘든 간병의 여정을 안심하고 함께 걸어갈 수 있도록 돕습니다.</p>
                            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '16px' }}>
                                <button style={{ backgroundColor: '#ffffff', color: '#4f46e5', padding: '16px 32px', borderRadius: '12px', fontWeight: 'bold', border: 'none', cursor: 'pointer' }}>맞춤 간병인 신청하기</button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
