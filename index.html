<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온가족간병협회</title>
    <style>
        body {
            margin: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .hero {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 24px;
            padding: 80px 40px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15);
        }
        .hero h1 {
            font-size: 42px;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        .hero p {
            font-size: 18px;
            color: #e0e7ff;
            max-width: 700px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }
        .btn {
            background-color: #ffffff;
            color: #4f46e5;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">온가족간병협회</div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>우리 가족을 위한<br>가장 따뜻하고 안전한 간병</h1>
            <p>온가족간병협회는 검증된 전문 간병인과 가족을 신뢰로 연결하여, 힘든 간병의 여정을 안심하고 함께 걸어갈 수 있도록 돕습니다.</p>
            <button class="btn">맞춤 간병인 신청하기</button>
        </div>
    </div>

</body>
</html>
