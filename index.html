<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온가족간병협회</title>
    <style>
        body {
            margin: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            text-decoration: none;
            color: #475569;
            font-weight: 600;
            font-size: 15px;
        }
        .nav a.active {
            color: #4f46e5;
        }
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .hero {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 32px;
            padding: 100px 40px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.15);
        }
        .hero h1 {
            font-size: 46px;
            margin-bottom: 24px;
            line-height: 1.3;
            font-weight: 800;
        }
        .hero p {
            font-size: 19px;
            color: #e0e7ff;
            max-width: 700px;
            margin: 0 auto 40px auto;
            line-height: 1.7;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .btn {
            background-color: #ffffff;
            color: #4f46e5;
            padding: 18px 44px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .btn-outline {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">온가족간병협회</div>
        <div class="nav">
            <a href="#" class="active">홈</a>
            <a href="#">서비스 안내</a>
            <a href="#">간병인 찾기</a>
            <a href="#">고객센터</a>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>우리 가족을 위한<br>가장 따뜻하고 안전한 간병</h1>
            <p>온가족간병협회는 검증된 전문 간병인과 가족을 신뢰로 연결하여, 힘든 간병의 여정을 안심하고 함께 걸어갈 수 있도록 돕습니다.</p>
            <div class="btn-group">
                <button class="btn">맞춤 간병인 신청하기</button>
                <button class="btn btn-outline">이용 안내 보기</button>
            </div>
        </div>
    </div>

</body>
</html>
