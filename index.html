<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온가족간병협회</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/text/babel">
        // 온가족간병협회 웹사이트 애플리케이션 생성
        const App = () => {
            return (
                <div class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased selection:bg-indigo-500 selection:text-white">
                    <header class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/80 backdrop-blur-md">
                        <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-6">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl font-black tracking-tight text-indigo-600">온가족간병협회</span>
                            </div>
                            <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-slate-600">
                                <a href="#" class="text-indigo-600 transition">홈</a>
                                <a href="#" class="hover:text-indigo-600 transition">서비스 안내</a>
                                <a href="#" class="hover:text-indigo-600 transition">간병인 찾기</a>
                                <a href="#" class="hover:text-indigo-600 transition">고객센터</a>
                            </nav>
                        </div>
                    </header>
                    <main class="mx-auto max-w-7xl px-6 py-12">
                        <div class="text-center py-20 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-3xl text-white shadow-xl shadow-indigo-100 px-4">
                            <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-6 leading-tight">우리 가족을 위한<br/>가장 따뜻하고 안전한 간병</h1>
                            <p class="text-lg text-indigo-100 max-w-2xl mx-auto mb-8 font-medium">온가족간병협회는 검증된 전문 간병인과 가족을 신뢰로 연결하여, 힘든 간병의 여정을 안심하고 함께 걸어갈 수 있도록 돕습니다.</p>
                            <div class="flex flex-wrap justify-center gap-4">
                                <button class="bg-white text-indigo-600 px-8 py-4 rounded-xl font-bold hover:bg-indigo-50 transition shadow-md">맞춤 간병인 신청하기</button>
                                <button class="border border-indigo-200/30 bg-indigo-500/20 backdrop-blur-sm text-white px-8 py-4 rounded-xl font-bold hover:bg-indigo-500/40 transition">이용 안내 보기</button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
